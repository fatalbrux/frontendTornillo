<div class="min-h-screen bg-slate-100 flex items-center justify-center p-4 font-sans text-slate-800">
  <div class="bg-white w-full max-w-sm rounded-xl border border-slate-200 shadow-xl p-6 space-y-6 text-xs">
    
    <div class="text-center space-y-1">
      <div class="mx-auto w-12 h-12 bg-[#12335c] text-white rounded-xl flex items-center justify-center shadow-md">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      </div>
      <h2 class="text-lg font-bold text-slate-800 pt-2">Tornillo Loko</h2>
      <p class="text-slate-400 font-medium font-mono text-[10px]">Sistema de Control Técnico</p>
    </div>

    @if (errorLogin()) {
      <div class="bg-red-50 border border-red-200 text-red-700 p-3 rounded-lg font-medium text-center">
        {{ errorLogin() }}
      </div>
    }

    <form (ngSubmit)="funLogin()" class="space-y-4">
      <div class="space-y-1">
        <label class="font-bold text-slate-600 block">Número de C.I.</label>
        <input type="text" [(ngModel)]="credenciales.ci" name="ci" placeholder="Ingresa tu documento" required class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-slate-800 focus:outline-none focus:border-slate-500 font-mono">
      </div>

      <div class="space-y-1">
        <label class="font-bold text-slate-600 block">Contraseña</label>
        <input type="password" [(ngModel)]="credenciales.password" name="password" placeholder="••••••••" required class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-slate-800 focus:outline-none focus:border-slate-500">
      </div>

      <button type="submit" class="w-full py-2.5 bg-[#12335c] hover:bg-[#0b213d] text-white text-xs font-bold rounded-lg transition-all shadow-md">
        Ingresar al Sistema
      </button>
    </form>

  </div>
</div>
