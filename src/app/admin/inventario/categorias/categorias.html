<div class="bg-white rounded-xl shadow p-5">
  <div class="flex justify-between items-center mb-4">
    <h3 class="text-lg font-bold text-gray-700">Categorías</h3>
    <button (click)="abrirModal()" 
      class="bg-green-800 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-green-700 transition-colors">
      + Nueva categoría
    </button>
  </div>

  <!-- Tabla -->
  <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="bg-green-50 text-green-900">
          <th class="text-left p-3 rounded-l-lg">Nombre</th>
          <th class="text-left p-3">Descripción</th>
          <th class="text-left p-3 rounded-r-lg">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cat of categorias" class="border-b border-gray-100 hover:bg-gray-50">
          <td class="p-3 font-medium">{{ cat.nombre }}</td>
          <td class="p-3 text-gray-500">{{ cat.descripcion }}</td>
          <td class="p-3 flex gap-2">
            <button (click)="editar(cat)" class="text-blue-600 hover:text-blue-800 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
              </svg>
            </button>
            <button (click)="eliminar(cat.id)" class="text-red-500 hover:text-red-700 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </td>
        </tr>
        <tr *ngIf="categorias.length === 0">
          <td colspan="3" class="p-6 text-center text-gray-400">No hay categorías registradas</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal -->
  <div *ngIf="modalAbierto" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-md mx-4">
      <h4 class="text-lg font-bold text-gray-800 mb-4">
        {{ modoEdicion ? 'Editar categoría' : 'Nueva categoría' }}
      </h4>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">Nombre</label>
          <input [(ngModel)]="form.nombre" type="text" placeholder="Ej. Lubricantes"
            class="w-full border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"/>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1">Descripción</label>
          <input [(ngModel)]="form.descripcion" type="text" placeholder="Opcional"
            class="w-full border border-gray-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"/>
        </div>
      </div>
      <div class="flex gap-3 mt-6">
        <button (click)="cerrarModal()" 
          class="flex-1 border border-gray-200 text-gray-600 py-2 rounded-lg text-sm font-semibold hover:bg-gray-50">
          Cancelar
        </button>
        <button (click)="guardar()"
          class="flex-1 bg-green-800 text-white py-2 rounded-lg text-sm font-semibold hover:bg-green-700">
          {{ modoEdicion ? 'Actualizar' : 'Guardar' }}
        </button>
      </div>
    </div>
  </div>
</div>
