<div class="p-6 space-y-6">
  <div class="flex justify-between items-center bg-white p-4 rounded-xl border">
    <h2 class="font-bold text-lg">Panel de Inventario</h2>
    <button (click)="abrirNuevoInsumo()" class="bg-[#1a365d] text-white px-4 py-2 rounded-lg font-bold">+ NUEVO PRODUCTO</button>
  </div>

  <table class="w-full bg-white border rounded-xl p-4">
    <tr class="text-xs text-slate-400 border-b">
      <th class="p-3 text-left">Nombre</th>
      <th class="p-3 text-left">Código</th>
      <th class="p-3 text-left">Stock</th>
      <th class="p-3 text-right">Acciones</th>
    </tr>
    @for (ins of listaInsumos(); track ins.id) {
      <tr class="border-t text-sm">
        <td class="p-3">{{ins.nombre}}</td>
        <td class="p-3">{{ins.codigoBase}}</td>
        <td class="p-3">{{ins.stock}}</td>
        <td class="p-3 text-right space-x-2">
          <button (click)="editarInsumo(ins)" class="text-orange-500">✏️</button>
          <button (click)="eliminarInsumo(ins.id)" class="text-red-500">🗑️</button>
        </td>
      </tr>
    }
  </table>

  <!-- Categorías y Unidades de medida con sus propios componentes -->
  <app-categorias (cambio)="refrescar()" />
  <app-unidades-medida (cambio)="refrescar()" />
</div>

@if (mostrarModal()) {
  <div class="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
    <div class="bg-white w-full max-w-lg p-6 rounded-xl space-y-3 max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center border-b pb-2">
        <h2 class="font-bold">{{ form.id ? 'EDITAR PRODUCTO' : 'NUEVO PRODUCTO' }}</h2>
        <button (click)="cerrarModal()" class="text-slate-400">✕</button>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <input [(ngModel)]="form.nombre" placeholder="Nombre" class="col-span-2 border p-2 rounded">
        <input [(ngModel)]="form.codigoBase" placeholder="Código" class="border p-2 rounded">

        <select [(ngModel)]="form.tipoElectrodomestico" class="border p-2 rounded">
          <option [ngValue]="''">Tipo Electrodoméstico...</option>
          @for (e of listaElectro(); track e.id) {
            <option [value]="e.tipo">{{e.tipo}}</option>
          }
        </select>

        <input [(ngModel)]="form.stock" type="number" placeholder="Stock" class="border p-2 rounded">
        <input [(ngModel)]="form.stockMinimo" type="number" placeholder="Stock Mínimo" class="border p-2 rounded">
        <textarea [(ngModel)]="form.descripcion" placeholder="Descripción" class="col-span-2 border p-2 rounded"></textarea>
      </div>

      <select [(ngModel)]="form.categoriaId" class="w-full border p-2 rounded">
        <option [ngValue]="undefined">Seleccionar Categoría...</option>
        @for (c of listaCat(); track c.id) { <option [value]="c.id">{{c.nombre}}</option> }
      </select>

      <select [(ngModel)]="form.unidadMedidadId" class="w-full border p-2 rounded">
        <option [ngValue]="undefined">Seleccionar Unidad...</option>
        @for (u of listaUni(); track u.id) { <option [value]="u.id">{{u.nombre}}</option> }
      </select>

      <button (click)="guardarInsumo()" class="w-full bg-[#1a365d] text-white p-3 rounded-lg font-bold">
        {{ form.id ? 'ACTUALIZAR PRODUCTO' : 'GUARDAR PRODUCTO' }}
      </button>
    </div>
  </div>
}
