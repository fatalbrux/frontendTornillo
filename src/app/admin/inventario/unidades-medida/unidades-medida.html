<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">Unidades de Medida</h1>
    <button (click)="abrirModalCrear()" class="bg-blue-600 text-white px-4 py-2 rounded">
      Nueva Unidad
    </button>
  </div>

  <table class="w-full border-collapse">
    <thead>
      <tr class="bg-gray-100">
        <th class="p-2 border">ID</th>
        <th class="p-2 border">Nombre</th>
        <th class="p-2 border">Abreviación</th>
        <th class="p-2 border">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let uni of listaUnidades()" class="border-b">
        <td class="p-2 border text-center">{{ uni.id }}</td>
        <td class="p-2 border">{{ uni.nombre }}</td>
        <td class="p-2 border">{{ uni.abreviacion }}</td>
        <td class="p-2 border text-center">
          <button (click)="editar(uni)" class="text-blue-600 mr-2">Editar</button>
          <button (click)="eliminar(uni.id!)" class="text-red-600">Eliminar</button>
        </td>
      </tr>
      <tr *ngIf="listaUnidades().length === 0">
        <td colspan="4" class="p-4 text-center text-gray-500">No hay unidades registradas.</td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="mostrarModal()" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white p-6 rounded shadow-lg w-96">
      <h2 class="text-lg font-bold mb-4">
        {{ modoEdicion() ? 'Editar unidad' : 'Nueva unidad' }}
      </h2>

      <input [(ngModel)]="form.nombre" placeholder="Nombre" class="w-full border p-2 mb-2">
      <input [(ngModel)]="form.abreviacion" placeholder="Sigla (ej: kg, und)" class="w-full border p-2 mb-4">

      <p *ngIf="mensajeError()" class="text-red-500 text-sm mb-4">{{ mensajeError() }}</p>

      <div class="flex justify-end">
        <button (click)="cerrarModal()" class="mr-2 text-gray-600">Cancelar</button>
        <button (click)="guardar()" class="bg-blue-600 text-white px-4 py-2 rounded">
          {{ modoEdicion() ? 'Actualizar' : 'Guardar' }}
        </button>
      </div>
    </div>
  </div>
</div>
