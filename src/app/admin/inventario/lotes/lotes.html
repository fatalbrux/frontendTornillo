<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">Lotes</h1>
    <button (click)="abrirModalCrear()" class="bg-blue-600 text-white px-4 py-2 rounded">Nuevo Lote</button>
  </div>

  <table class="w-full border-collapse">
    <thead>
      <tr class="bg-gray-100">
        <th class="p-2 border">Insumo</th>
        <th class="p-2 border">Fecha Venc.</th>
        <th class="p-2 border">Stock</th>
        <th class="p-2 border">Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let lote of listaLotes()" class="border-b">
        <td class="p-2 border">{{ getNombreInsumo(lote.insumoId!) }}</td>
        <td class="p-2 border">{{ lote.fechaVencimiento }}</td>
        <td class="p-2 border">{{ lote.stockActual }}</td>
        <td class="p-2 border text-center">
          <button (click)="editar(lote)" class="text-blue-600">Editar</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="mostrarModal()" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
    <div class="bg-white p-6 rounded w-96">
      <h2 class="text-lg font-bold mb-4">Gestionar Lote</h2>
      <select [(ngModel)]="form.insumoId" class="w-full border p-2 mb-2">
        <option *ngFor="let i of listaInsumos()" [ngValue]="i.id">{{ i.nombre }}</option>
      </select>
      <input type="date" [(ngModel)]="form.fechaVencimiento" class="w-full border p-2 mb-2">
      <button (click)="guardar()" class="bg-blue-600 text-white w-full py-2 rounded">Guardar</button>
    </div>
  </div>
</div>
